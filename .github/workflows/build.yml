name: Build EclipseX TG

on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone AyuGram
        env:
          GIT_TERMINAL_PROMPT: 0
        run: |
          git clone https://github.com/AyuGram/AyuGram4A.git source
          cd source
          rm -f .gitmodules

      - name: Create proprietary stubs
        run: |
          mkdir -p source/TMessagesProj/src/main/java/com/radolyn/ayugram/proprietary
          cat > source/TMessagesProj/src/main/java/com/radolyn/ayugram/proprietary/AyuHistoryHook.java << 'JEOF'
package com.radolyn.ayugram.proprietary;
import org.telegram.messenger.MessageObject;
public class AyuHistoryHook {
    public static final boolean INJECTED = false;
    public static boolean onMessageReceive(long dialogId, int maxId, int offset) { return false; }
    public static boolean shouldSkipMsg(MessageObject messageObject) { return false; }
    public static void onMsgReceive(MessageObject messageObject) {}
}
JEOF
          cat > source/TMessagesProj/src/main/java/com/radolyn/ayugram/proprietary/AyuMessageUtils.java << 'JEOF2'
package com.radolyn.ayugram.proprietary;
import org.telegram.tgnet.TLRPC;
import org.telegram.messenger.MessageObject;
public class AyuMessageUtils {
    public static boolean canShowMessage(TLRPC.Message message, boolean isBot) { return true; }
    public static boolean showEdited(MessageObject messageObject) { return false; }
    public static boolean skipRead(MessageObject messageObject) { return false; }
}
JEOF2

      - name: Patch
        run: |
          cd source
          sed -i s/APP_PACKAGE=com.radolyn.ayugram/APP_PACKAGE=com.eclipsextg.messenger/ gradle.properties
          sed -i 's|<string name=AppName>Telegram</string>|<string name=AppName>EclipseX TG</string>|' TMessagesProj/src/main/res/values/strings.xml
          sed -i 's|com.exteragram.messenger.DefaultIcon|com.eclipsextg.messenger.DefaultIcon|' TMessagesProj/src/main/AndroidManifest.xml
          sed -i '/google-services/d' TMessagesProj/build.gradle
          sed -i '/com.google.gms.google-services/d' build.gradle

      - name: Create API keys
        run: |
          cd source
          printf 'APP_ID=6\nAPP_HASH=eb06d4abfb49dc3eeb1aeb98ae0f581e\nMAPS_V2_API=x\n' > API_KEYS

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install ndk\;21.4.7075529 cmake\;3.22.1

      - name: Build
        run: |
          cd source
          chmod +x gradlew
          ./gradlew assembleArm64 --no-daemon -Dorg.gradle.jvmargs=-Xmx2g

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: EclipseX-TG-APK
          path: source/TMessagesProj/build/outputs/apk/arm64/release/*.apk
          if-no-files-found: error
